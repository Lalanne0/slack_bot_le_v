<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - Masterclass Bot</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f7f6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      background: white;
    }
    .login-icon {
      font-size: 3rem;
      color: #0d6efd;
      margin-bottom: 1rem;
      text-align: center;
    }
    .btn-login {
      width: 100%;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="text-center">
    <i class="fas fa-lock login-icon"></i>
    <h3 class="mb-3">Authentification Globale</h3>
    <p class="text-muted mb-4">Connectez-vous avec vos identifiants Nexus. Cela déverrouillera l'application pour tous les utilisateurs.</p>
  </div>

  {% if error %}
  <div class="alert alert-danger" role="alert">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="{{ url_for('main.login') }}">
    <div class="mb-3">
      <label for="email" class="form-label">Email Nexus</label>
      <input type="email" class="form-control" id="email" name="email" required placeholder="nom@datascientest.com">
    </div>
    <div class="mb-4">
      <label for="password" class="form-label">Mot de passe</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-login">Se Connecter</button>
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
