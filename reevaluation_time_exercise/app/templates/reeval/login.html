{% extends "reeval/base.html" %}
{% block title %}Login - Time Reevaluation{% endblock %}

{% block body %}
<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>⏱ Time Reevaluation</h1>
      <p>Compare actual vs. recommended exercise durations</p>
    </div>

    {% if error %}
    <div class="alert-error" id="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('reeval.login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required
          autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" id="login-submit">
        Sign In
      </button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem;">
      <a href="/" class="btn btn-secondary btn-sm"
        style="font-size: 0.8rem; color: var(--text-secondary); text-decoration: none;">
        ← Back to Main Dashboard
      </a>
    </div>
  </div>
</div>
{% endblock %}
